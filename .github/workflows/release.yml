name: Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Deploy
        run: |
          ./gradlew publish \
            -Pusername=${{ github.actor }} \
            -Ppassword=${{ secrets.GITHUB_TOKEN }} \
            -PpublishUrl=https://maven.pkg.github.com/codice/mpegts-streamer
